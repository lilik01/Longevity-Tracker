<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longevity Tracker</title>
    
    <!-- Мета-теги для превью -->
    <meta property="og:title" content="Longevity Tracker">
    <meta property="og:description" content="Ваш персональный трекер долголетия">
    <meta property="og:image" content="Gemini_Generated_Image_3qc703qc703qc703.jpg">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Ресурсы -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .splash-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .logo-img {
            max-width: 85%;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-[#F5F5F7] text-[#1D1D1F] font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
          const [showSplash, setShowSplash] = useState(true);
          const [weight, setWeight] = useState('');
          
          useEffect(() => {
            const timer = setTimeout(() => setShowSplash(false), 2500);
            return () => clearTimeout(timer);
          }, []);

          const [tasks, setTasks] = useState([
            { id: 1, icon: 'fa-solid fa-utensils', color: 'text-orange-500', bg: 'bg-orange-100', text: 'Еда: 3 приема, паузы 4-5 ч., ночь 12-14 ч.', completed: false, rationale: 'Снижает инсулин, выключает mTOR, запускает аутофагию.' },
            { id: 2, icon: 'fa-solid fa-dumbbell', color: 'text-red-500', bg: 'bg-red-100', text: 'Белок: 25-30 г в каждый прием с клетчаткой.', completed: false, rationale: 'Предотвращает саркопению (возрастную потерю мышц).' },
            { id: 3, icon: 'fa-solid fa-droplet', color: 'text-yellow-500', bg: 'bg-yellow-100', text: 'Жиры: Оливковое масло (без нагрева), орехи, семена.', completed: false, rationale: 'Омега-3 делают клеточные мембраны более гибкими.' },
            { id: 4, icon: 'fa-solid fa-fire', color: 'text-amber-600', bg: 'bg-amber-100', text: 'Готовка: Варка, тушение (ниже 140°C).', completed: false, rationale: 'Снижает образование конечных продуктов гликирования (AGEs).' },
            { id: 5, icon: 'fa-solid fa-moon', color: 'text-indigo-500', bg: 'bg-indigo-100', text: 'Сон: 18-19°C, блэкаут, без экранов за 1 ч.', completed: false, rationale: 'Запускает работу глимфатической системы очистки мозга.' },
            { id: 6, icon: 'fa-solid fa-heart-pulse', color: 'text-rose-500', bg: 'bg-rose-100', text: 'Активность: Силовая нагрузка до усилия.', completed: false, rationale: 'Стимулирует синтез белка и утилизацию лишней глюкозы.' },
            { id: 7, icon: 'fa-solid fa-sun', color: 'text-sky-500', bg: 'bg-sky-100', text: 'Защита: SPF 30+ на открытые участки кожи.', completed: false, rationale: 'Защищает коллаген от разрушения солнечным светом.' }
          ]);

          const [balanceSec, setBalanceSec] = useState('');
          const [testResult, setTestResult] = useState(null);

          const toggleTask = (id) => {
            setTasks(tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
          };

          const proteinNeed = weight > 0 ? {
            min: (weight * 1.0).toFixed(0),
            max: (weight * 1.2).toFixed(0),
            perMeal: Math.round(((weight * 1.1) / 3))
          } : null;

          const handleBalanceTest = () => {
            const s = parseInt(balanceSec);
            if (isNaN(s)) return;
            let msg = s >= 20 ? 'Отлично! Нервная система и мышцы в норме.' : s >= 10 ? 'Удовлетворительно. Требуется больше силовой нагрузки.' : 'Внимание: риск саркопении. Фокус на упражнениях на баланс и силу.';
            setTestResult({ s, msg, status: s >= 20 ? 'ok' : s >= 10 ? 'warn' : 'err' });
          };

          const done = tasks.filter(t => t.completed).length;
          const pct = Math.round((done / tasks.length) * 100);

          return (
            <div className="relative min-h-screen">
              {/* SPLASH SCREEN */}
              <div className={`splash-screen ${!showSplash ? 'splash-hidden' : ''}`}>
                 <img src="Gemini_Generated_Image_3qc703qc703qc703.jpg" alt="Logo" className="logo-img mb-8" 
                      onError={(e) => { e.target.src='https://via.placeholder.com/400?text=Longevity+Tracker'; }} />
                 <div className="text-center">
                    <h1 className="text-3xl font-bold tracking-tight text-[#1D1D1F]">Longevity Tracker</h1>
                    <div className="mt-8 w-10 h-10 border-4 border-gray-100 border-t-blue-500 rounded-full animate-spin mx-auto"></div>
                 </div>
              </div>

              {/* MAIN CONTENT */}
              <div className={`max-w-4xl mx-auto p-4 md:p-10 transition-opacity duration-1000 ${showSplash ? 'opacity-0' : 'opacity-100'}`}>
                <header className="mb-10 text-center md:text-left">
                  <h1 className="text-4xl font-extrabold tracking-tight">Longevity Tracker</h1>
                  <p className="text-[#86868B] text-lg mt-1 font-medium">Ваш персональный план активного долголетия</p>
                </header>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                  <div className="md:col-span-1 space-y-6">
                    <section className="bg-white rounded-3xl p-8 shadow-sm border border-gray-100 flex flex-col items-center">
                       <h3 className="text-sm font-bold uppercase tracking-widest text-gray-400 mb-6 w-full">Прогресс дня</h3>
                       <div className="relative flex items-center justify-center w-40 h-40">
                          <svg className="w-full h-full transform -rotate-90">
                             <circle cx="80" cy="80" r="70" stroke="#F5F5F7" strokeWidth="12" fill="none" />
                             <circle cx="80" cy="80" r="70" stroke="#34C759" strokeWidth="12" fill="none" 
                                     strokeDasharray="440" strokeDashoffset={440 - (440 * pct / 100)} 
                                     strokeLinecap="round" className="transition-all duration-700" />
                          </svg>
                          <span className="absolute text-4xl font-bold tracking-tighter">{pct}%</span>
                       </div>
                       <p className="mt-6 text-[#86868B] font-medium">{done} из {tasks.length} выполнено</p>
                    </section>

                    <section className="bg-white rounded-3xl p-8 shadow-sm border border-gray-100">
                      <h3 className="text-sm font-bold uppercase tracking-widest text-gray-400 mb-4">Норма белка</h3>
                      <input type="number" value={weight} onChange={e => setWeight(e.target.value)} placeholder="Ваш вес (кг)" 
                             class="w-full p-4 bg-[#F5F5F7] rounded-2xl outline-none focus:ring-2 focus:ring-blue-400 transition-all font-bold text-xl" />
                      {proteinNeed && (
                        <div className="mt-6 space-y-4 animate-in fade-in">
                          <div className="p-4 bg-blue-50 rounded-2xl text-center">
                             <p className="text-3xl font-black text-blue-600">{proteinNeed.min}-{proteinNeed.max}г</p>
                             <p className="text-xs font-bold text-blue-400 uppercase mt-1">в сутки</p>
                          </div>
                          <p className="text-sm text-gray-500 text-center font-medium">По ~<span className="text-blue-600 font-bold">{proteinNeed.perMeal}г</span> в каждый из 3-х приемов пищи.</p>
                        </div>
                      )}
                    </section>
                  </div>

                  <div className="md:col-span-2 space-y-8">
                    <section className="bg-white rounded-3xl p-8 shadow-sm border border-gray-100">
                      <h3 className="text-sm font-bold uppercase tracking-widest text-gray-400 mb-6">Дневной протокол</h3>
                      <div className="space-y-3">
                        {tasks.map(t => (
                          <div key={t.id} onClick={() => toggleTask(t.id)} 
                               className={`flex items-center gap-5 p-5 rounded-2xl cursor-pointer transition-all border-2 
                                          ${t.completed ? 'bg-green-50 border-green-200' : 'bg-[#F5F5F7] border-transparent hover:bg-gray-200'}`}>
                            <div className={`w-12 h-12 rounded-full flex items-center justify-center text-xl ${t.bg} ${t.color}`}>
                               <i className={t.icon}></i>
                            </div>
                            <div className="flex-1">
                               <p className={`font-bold text-lg ${t.completed ? 'text-green-800' : ''}`}>{t.text}</p>
                               <p className="text-sm text-gray-500 leading-tight mt-1">{t.rationale}</p>
                            </div>
                            {t.completed && <i className="fa-solid fa-check text-green-500 text-2xl"></i>}
                          </div>
                        ))}
                      </div>
                    </section>

                    <section className="bg-white rounded-3xl p-8 shadow-sm border border-gray-100">
                      <h3 className="text-sm font-bold uppercase tracking-widest text-gray-400 mb-4">Тест на баланс</h3>
                      <div className="flex gap-4">
                        <input type="number" value={balanceSec} onChange={e => setBalanceSec(e.target.value)} placeholder="Секунды" 
                               class="flex-1 p-4 bg-[#F5F5F7] rounded-2xl outline-none font-bold" />
                        <button onClick={handleBalanceTest} class="bg-black text-white px-8 rounded-2xl font-bold hover:bg-gray-800 transition-all">Оценить</button>
                      </div>
                      {testResult && (
                        <div className={`mt-6 p-5 rounded-2xl font-medium flex gap-4 items-start
                                        ${testResult.status==='ok'?'bg-green-50 text-green-700':testResult.status==='warn'?'bg-yellow-50 text-yellow-700':'bg-red-50 text-red-700'}`}>
                           <i className="fa-solid fa-circle-info mt-1"></i>
                           <p>{testResult.msg}</p>
                        </div>
                      )}
                    </section>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
